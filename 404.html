<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Melvin Biju</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP for smooth animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');

        :root {
            --bg-dark: #0a0a0a;
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--accent);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Ambient background glow */
        .glow {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
        }

        .error-code {
            font-size: clamp(8rem, 20vw, 15rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.05em;
            background: linear-gradient(180deg, #fff 0%, rgba(255, 255, 255, 0.2) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            position: relative;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .btn-home {
            display: inline-block;
            margin-top: 2rem;
            padding: 1rem 2.5rem;
            background: white;
            color: black;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }

        .btn-home:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        /* Grid background pattern */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="glow" id="glow"></div>

    <div class="container flex flex-col items-center">
        <div class="error-code" id="error-text">404</div>
        
        <div class="glass-card reveal">
            <h1 class="text-3xl font-bold mb-4">Lost in Space?</h1>
            <p class="text-gray-400 text-lg">
                The page you're looking for has drifted away. <br> 
                Maybe it never existed, or it's currently being redesigned.
            </p>
            
            <a href="index.html" class="btn-home">
                Back to Home
            </a>
        </div>
        
        <div class="mt-12 text-gray-600 text-sm reveal uppercase tracking-widest">
            Melvin Biju &copy; <span id="year"></span>
        </div>
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        window.onload = () => {
            // Animate error text
            gsap.from("#error-text", {
                y: 100,
                opacity: 0,
                duration: 1.5,
                ease: "power4.out"
            });

            // Float animation for 404
            gsap.to("#error-text", {
                y: -20,
                duration: 2,
                repeat: -1,
                yoyo: true,
                ease: "sine.inOut"
            });

            // Reveal card
            gsap.from(".reveal", {
                y: 40,
                opacity: 0,
                duration: 1,
                stagger: 0.2,
                delay: 0.5,
                ease: "power3.out"
            });

            // Mouse move effect for background glow
            document.addEventListener('mousemove', (e) => {
                const x = e.clientX;
                const y = e.clientY;
                
                gsap.to("#glow", {
                    x: x - (window.innerWidth / 2),
                    y: y - (window.innerHeight / 2),
                    duration: 2,
                    ease: "power2.out"
                });
            });
        };
    </script>
</body>
</html>
